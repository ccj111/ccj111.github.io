<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 签名底层靶机 (AppKit 修复版)</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .box { border: 1px solid #333; padding: 25px; border-radius: 8px; background: #1e1e1e; max-width: 600px; margin: 0 auto; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }
        h2 { color: #fff; margin-top: 0; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; margin: 5px 5px 15px 0; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: inherit;}
        button:hover { background: #0056b3; }
        button:disabled { background: #555 !important; cursor: not-allowed; }
        #log { background: #000; padding: 15px; border: 1px solid #333; height: 250px; overflow-y: auto; color: #aaa; border-radius: 4px; line-height: 1.5; font-size: 14px;}
        .highlight { color: #fff; font-weight: bold; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@reown/appkit-standalone@1.0.1/dist/index.iife.js"></script>
</head>
<body>
    <div class="box">
        <h2>🎯 Web3 靶机 (AppKit 架构)</h2>
        <p>状态: <strong id="status" style="color: yellow;">准备初始化...</strong></p>
        <p>目标地址: <strong id="address" style="color: #00ff00;">未连接</strong></p>

        <button id="connectBtn">🔌 扫码连接钱包</button>
        <button id="disconnectBtn" style="display:none; background: #e67e22;">❌ 断开连接</button>

        <hr style="border-color: #333; margin: 20px 0;">

        <div id="testPanel" style="display:none;">
            <h3 style="color: #fff;">🔥 攻击载荷发射器</h3>
            <button id="btnPersonalSign">发送普通签名</button><br>
            <button id="btnTypedData" style="background:#dc3545">发送高危钓鱼表单</button>
        </div>
        
        <h3 style="color: #fff; margin-bottom: 5px;">📜 运行日志</h3>
        <pre id="log"></pre>
    </div>

    <script>
        // 🔴🔴🔴 记得填入你的 Project ID 🔴🔴🔴
        const PROJECT_ID = "ebe749f95f165c984f928c62b271a9df"; 

        const statusEl = document.getElementById("status");
        const addressEl = document.getElementById("address");
        const connectBtn = document.getElementById("connectBtn");
        const disconnectBtn = document.getElementById("disconnectBtn");
        const testPanel = document.getElementById("testPanel");
        const logEl = document.getElementById("log");

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div><span style="color:#555">[${time}]</span> ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        let appKit;
        let provider;

        // 初始化
        window.addEventListener('load', async () => {
            if (typeof window.AppKitStandalone === 'undefined') {
                log("<span style='color:red'>🚨 库加载失败，请检查网络访问。</span>");
                return;
            }

            try {
                // 使用全新的 AppKitStandalone
                appKit = new window.AppKitStandalone.AppKit({
                    projectId: PROJECT_ID,
                    networks: [1], // 主网
                    features: { analytics: false }
                });

                log("<span style='color:green'>🟢 引擎加载成功！准备下发载荷。</span>");
                statusEl.innerText = "准备就绪";
            } catch (e) {
                log("🚨 初始化报错: " + e.message);
            }
        });

        connectBtn.onclick = async () => {
            try {
                log("⏳ 正在请求生成连接通道...");
                // 唤起二维码
                await appKit.open();
                
                // 监听连接
                appKit.subscribeEvents(async (event) => {
                    if (event.data.event === "CONNECT_SUCCESS") {
                        // 获取 Provider
                        provider = appKit.getWalletProvider();
                        window.pocProvider = provider;

                        const accounts = await provider.request({ method: 'eth_accounts' });
                        window.targetAddress = accounts[0];

                        statusEl.innerText = "通道已建立";
                        statusEl.style.color = "green";
                        addressEl.innerText = window.targetAddress;
                        connectBtn.style.display = "none";
                        disconnectBtn.style.display = "inline-block";
                        testPanel.style.display = "block";
                        log("✅ 成功锁定地址: " + window.targetAddress);
                    }
                });
            } catch (err) {
                log("🚨 连接异常: " + err.message);
            }
        };

        disconnectBtn.onclick = async () => {
            await appKit.disconnect();
            location.reload();
        };

        // 发射载荷
        document.getElementById("btnPersonalSign").onclick = async () => {
            log("🚀 发射签名载荷...");
            const msg = "0x" + Array.from(new TextEncoder().encode("Hello Web3")).map(b => b.toString(16).padStart(2, '0')).join("");
            try {
                const res = await provider.request({
                    method: 'personal_sign',
                    params: [msg, window.targetAddress]
                });
                log("<span style='color:green'>✅ 签名成功!</span>");
            } catch (err) {
                log("❌ 签名失败: " + err.message);
            }
        };

        document.getElementById("btnTypedData").onclick = async () => {
            log("🚀 发射钓鱼载荷...");
            const typedData = JSON.stringify({
                domain: { name: '🛡️ 安全验证', version: '1', chainId: 1 },
                message: { 警告: "高危测试", 操作: "转移所有资产", 金额: "无限" },
                primaryType: 'Test',
                types: {
                    EIP712Domain: [{name:'name',type:'string'},{name:'version',type:'string'},{name:'chainId',type:'uint256'}],
                    Test: [{name:'警告',type:'string'},{name:'操作',type:'string'},{name:'金额',type:'string'}]
                }
            });
            try {
                await provider.request({
                    method: 'eth_signTypedData_v4',
                    params: [window.targetAddress, typedData]
                });
                log("<span style='color:green'>✅ 表单签名成功!</span>");
            } catch (err) {
                log("❌ 失败: " + err.message);
            }
        };
    </script>
</body>
</html>
