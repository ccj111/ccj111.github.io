<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 签名底层靶机 (GitHub 修复版)</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .box { border: 1px solid #333; padding: 25px; border-radius: 8px; background: #1e1e1e; max-width: 600px; margin: 0 auto; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }
        h2 { color: #fff; margin-top: 0; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; margin: 5px 5px 15px 0; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: inherit;}
        button:hover { background: #0056b3; }
        button:disabled { background: #555 !important; cursor: not-allowed; border: 1px solid #444; }
        .danger-btn { background: #dc3545; }
        .danger-btn:hover { background: #c82333; }
        #log { background: #000; padding: 15px; border: 1px solid #333; height: 250px; overflow-y: auto; color: #aaa; border-radius: 4px; line-height: 1.5; font-size: 14px;}
        .highlight { color: #fff; font-weight: bold; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@web3modal/standalone@2.4.3/dist/index.js"></script>
</head>
<body>
    <div class="box">
        <h2>🎯 Web3 靶机控制台 (GitHub 版)</h2>
        <p>状态: <strong id="status" style="color: yellow;">正在连接云端引擎...</strong></p>
        <p>目标地址: <strong id="address" style="color: #00ff00;">未连接</strong></p>

        <button id="connectBtn" disabled>🔌 扫码连接钱包</button>
        <button id="disconnectBtn" style="display:none; background: #e67e22;">❌ 断开连接</button>

        <hr style="border-color: #333; margin: 20px 0;">

        <div id="testPanel" style="display:none;">
            <h3 style="color: #fff;">🔥 攻击载荷发射器</h3>
            <button id="btnPersonalSign">发送普通签名 (personal_sign)</button><br>
            <button id="btnTypedData" class="danger-btn">发送高级钓鱼表单 (TypedData_v4)</button>
        </div>
        
        <h3 style="color: #fff; margin-bottom: 5px;">📜 运行日志</h3>
        <pre id="log"><div><span style="color:#555">[System]</span> 正在初始化，请稍候...</div></pre>
    </div>

    <script>
        // 🔴🔴🔴 请在这里填入你真实的 Project ID 🔴🔴🔴
        const PROJECT_ID = "ebe749f95f165c984f928c62b271a9df"; 

        const statusEl = document.getElementById("status");
        const addressEl = document.getElementById("address");
        const connectBtn = document.getElementById("connectBtn");
        const disconnectBtn = document.getElementById("disconnectBtn");
        const testPanel = document.getElementById("testPanel");
        const logEl = document.getElementById("log");

        function log(msg) {
            console.log(msg);
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `<div><span style="color:#555">[${time}]</span> ${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        let web3Modal;

        // 核心加载逻辑
        window.onload = () => {
            if (typeof window.Web3Modal === 'undefined') {
                log(`🚨 <span style='color:red'>核心库加载失败！请检查 jsDelivr 访问是否正常。</span>`);
                statusEl.innerText = "库加载失败";
                statusEl.style.color = "red";
                return;
            }

            try {
                web3Modal = new window.Web3Modal.Web3Modal({
                    projectId: PROJECT_ID,
                    walletConnectVersion: 2,
                    standaloneChains: ['eip155:1', 'eip155:56', 'eip155:137']
                });
                
                log(`🟢 <span style='color:green'>引擎加载成功，GitHub 部署环境就绪。</span>`);
                statusEl.innerText = "准备就绪";
                connectBtn.disabled = false;
            } catch (e) {
                log(`🚨 <span style='color:red'>初始化报错: ${e.message}</span>`);
            }
        };

        connectBtn.onclick = async () => {
            if (!web3Modal) {
                log(`🚨 <span style='color:red'>错误：Web3Modal 未定义，无法启动。</span>`);
                return;
            }
            
            try {
                log("⏳ 正在唤起扫码 UI...");
                connectBtn.disabled = true;
                
                const provider = await web3Modal.connect();
                window.pocProvider = provider;
                
                const accounts = await provider.request({ method: 'eth_accounts' });
                window.targetAddress = accounts[0];

                statusEl.innerText = "通道已建立";
                statusEl.style.color = "green";
                addressEl.innerText = window.targetAddress;
                connectBtn.style.display = "none";
                connectBtn.disabled = false;
                disconnectBtn.style.display = "inline-block";
                testPanel.style.display = "block";
                
                log(`✅ <span class='highlight'>成功连接！地址: ${window.targetAddress}</span>`);
            } catch (err) {
                connectBtn.disabled = false;
                log(`🚨 <span style='color:red'>连接异常: ${err.message}</span>`);
            }
        };

        disconnectBtn.onclick = () => {
            if (window.pocProvider && window.pocProvider.disconnect) {
                window.pocProvider.disconnect();
            }
            window.targetAddress = null;
            window.pocProvider = null;
            statusEl.innerText = "已断开";
            statusEl.style.color = "yellow";
            addressEl.innerText = "未连接";
            connectBtn.style.display = "inline-block";
            disconnectBtn.style.display = "none";
            testPanel.style.display = "none";
            log("❌ 已清理当前会话。");
        };

        // --- 攻击载荷发射区 ---

        document.getElementById("btnPersonalSign").onclick = async () => {
            log("🚀 发射 personal_sign 请求...");
            const text = "Hello from GitHub Web3 Tester!";
            const hexMessage = "0x" + text.split("").map(c => c.charCodeAt(0).toString(16)).join("");
            try {
                const res = await window.pocProvider.request({
                    method: 'personal_sign',
                    params: [hexMessage, window.targetAddress]
                });
                log(`✅ <span style='color:green'>签名成功: ${res.substring(0, 20)}...</span>`);
            } catch (err) {
                log(`❌ <span style='color:red'>拒绝或报错: ${err.message}</span>`);
            }
        };

        document.getElementById("btnTypedData").onclick = async () => {
            log("🚀 发射 eth_signTypedData_v4 (高危钓鱼表单)...");
            const typedData = JSON.stringify({
              domain: { name: '🛡️ 安全验证中心', version: '1.0', chainId: 1 },
              message: {
                "警告": "这是一次高危离线签名测试！",
                "操作": "授权转走所有的资产",
                "金额": "999,999,999",
                "黑客地址": "0xHack111111111111111111111111111111111111"
              },
              primaryType: 'TestAuth',
              types: {
                EIP712Domain: [
                  { name: 'name', type: 'string' },
                  { name: 'version', type: 'string' },
                  { name: 'chainId', type: 'uint256' }
                ],
                TestAuth: [
                  { name: '警告', type: 'string' },
                  { name: '操作', type: 'string' },
                  { name: '金额', type: 'string' },
                  { name: '黑客地址', type: 'string' }
                ]
              }
            });

            try {
                const res = await window.pocProvider.request({
                    method: 'eth_signTypedData_v4',
                    params: [window.targetAddress, typedData]
                });
                log(`✅ <span style='color:green'>结构化签名完成: ${res.substring(0, 20)}...</span>`);
            } catch (err) {
                log(`❌ <span style='color:red'>拒绝或报错: ${err.message}</span>`);
            }
        };
    </script>
</body>
</html>
