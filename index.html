<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 签名靶机 (回归版)</title>
    <style>
        body { background: #121212; color: #00ff00; font-family: monospace; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; background: #1e1e1e; max-width: 500px; margin: 0 auto; border-radius: 8px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-bottom: 10px; font-weight: bold; }
        button:disabled { background: #555; }
        #log { background: #000; padding: 10px; border: 1px solid #444; height: 200px; overflow-y: auto; font-size: 13px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>🎯 原始核心测试</h2>
    <p>状态: <span id="status" style="color: yellow;">等待引擎加载...</span></p>
    
    <button id="connectBtn" disabled>扫码连接钱包</button>
    
    <div id="controls" style="display:none; border-top: 1px solid #333; padding-top: 15px;">
        <button id="signBtn" style="background: #2ecc71;">测试签名 (personal_sign)</button>
        <button id="typedBtn" style="background: #e74c3c;">测试钓鱼表单 (EIP-712)</button>
    </div>

    <pre id="log"></pre>
</div>

<script type="module">
    // --- 核心补丁：防止底层库在浏览器里崩溃 ---
    if (typeof window !== 'undefined' && window.WebSocket && !WebSocket.prototype.terminate) {
        WebSocket.prototype.terminate = function() { this.close(); };
    }

    // 使用你最初测试成功的 esm.sh 链接
    import { EthereumProvider } from "https://esm.sh/@walletconnect/ethereum-provider@2.14.0";

    const PROJECT_ID = "ebe749f95f165c984f928c62b271a9df"; 
    let provider;

    const log = (m) => { document.getElementById("log").innerText += `\n[${new Date().toLocaleTimeString()}] ${m}`; };

    async function init() {
        try {
            provider = await EthereumProvider.init({
                projectId: PROJECT_ID,
                showQrModal: true,
                optionalChains: [1]
            });

            window.pocProvider = provider; // 挂载到全局方便调试
            
            document.getElementById("status").innerText = "准备就绪";
            document.getElementById("connectBtn").disabled = false;
            log("🟢 引擎初始化完毕");

            provider.on("connect", () => {
                log("✅ 钱包已连接: " + provider.accounts[0]);
                document.getElementById("controls").style.display = "block";
                document.getElementById("connectBtn").style.display = "none";
                document.getElementById("status").innerText = "已连接";
            });

        } catch (e) {
            log("🚨 初始化失败: " + e.message);
        }
    }

    // 按钮逻辑
    document.getElementById("connectBtn").onclick = () => provider.connect();

    document.getElementById("signBtn").onclick = async () => {
        log("🚀 发送签名请求...");
        const msg = "0x48656c6c6f2057656233"; // "Hello Web3"
        try {
            const res = await provider.request({
                method: 'personal_sign',
                params: [msg, provider.accounts[0]]
            });
            log("✅ 签名成功: " + res.substring(0, 20) + "...");
        } catch (e) { log("❌ 失败: " + e.message); }
    };

    document.getElementById("typedBtn").onclick = async () => {
        log("🚀 发送钓鱼表单...");
        const typedData = JSON.stringify({
            domain: { name: '🛡️ 安全验证', version: '1', chainId: 1 },
            message: { 警告: "高危测试", 操作: "转移资产", 金额: "无限" },
            primaryType: 'Test',
            types: {
                EIP712Domain: [{name:'name',type:'string'},{name:'version',type:'string'},{name:'chainId',type:'uint256'}],
                Test: [{name:'警告',type:'string'},{name:'操作',type:'string'},{name:'金额',type:'string'}]
            }
        });
        try {
            await provider.request({
                method: 'eth_signTypedData_v4',
                params: [provider.accounts[0], typedData]
            });
            log("✅ 表单签名成功!");
        } catch (e) { log("❌ 失败: " + e.message); }
    };

    init();
</script>

</body>
</html>
